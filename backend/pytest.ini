[pytest]
pythonpath = .
testpaths = tests
asyncio_mode = auto
addopts = --strict-markers
markers =
    unit: fast, fully mocked, no external dependency (default for CI)
    integration: cross-component, may hit DB or filesystem
    mlx_only: requires Apple Silicon + mlx-lm + downloaded model (skipped on Linux CI)
    e2e: full-stack via FastAPI TestClient + real model (skipped on Linux CI)
