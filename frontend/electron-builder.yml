appId: com.erudi.app
productName: Erudi
copyright: "Copyright © 2025 Erudi Team"

# Autonomous build: electron-builder packages the standalone webpack output
# directly (no electron-forge, no --prepackaged). The main entry is
# package.json "main" = .webpack/main.
directories:
  output: dist
  buildResources: assets

files:
  - ".webpack/**/*"
  - "package.json"
  - "!**/*.map"

asar: true
asarUnpack:
  - "**/*.node"

# The PyInstaller-frozen backend ships outside the asar (it is spawned as a
# child process). Built by CI before electron-builder runs; staged at
# backend/dist/backend.
extraResources:
  - from: "../backend/dist/backend"
    to: "backend"

# Reproduce the security fuses the forge plugin used to apply at package time.
electronFuses:
  runAsNode: false
  enableCookieEncryption: true
  enableNodeOptionsEnvironmentVariable: false
  enableNodeCliInspectArguments: false
  enableEmbeddedAsarIntegrityValidation: true
  onlyLoadAppFromAsar: true

# GitHub Releases — electron-updater reads latest*.yml from here at runtime.
# Real (non-draft) release: nothing is in prod yet, so we publish directly to
# validate the full auto-build → sign → notarize → publish path end-to-end.
# Prerelease-tagged versions (e.g. 0.0.1-test.1) are auto-flagged prerelease by
# electron-builder, so test tags never masquerade as a stable update.
publish:
  provider: github
  owner: djaxchi
  repo: erudi
  releaseType: release

# ---------- Windows ----------
win:
  target:
    - target: nsis
      arch: x64
  icon: assets/icons/icon.ico

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  installerIcon: assets/icons/icon.ico
  uninstallerIcon: assets/icons/icon.ico
  installerHeaderIcon: assets/icons/icon.ico
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Erudi

# ---------- macOS ----------
# electron-updater needs the zip target for delta updates; the DMG is the
# first-install artifact. electron-builder signs (with the entitlements below),
# notarizes and staples in one pass — no manual codesign dance.
mac:
  target:
    - target: dmg
      arch: arm64
    - target: zip
      arch: arm64
  icon: assets/icons/icon.icns
  category: public.app-category.productivity
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: assets/entitlements.mac.plist
  entitlementsInherit: assets/entitlements.mac.plist
  notarize: true
  # Explicitly sign the bundled PyInstaller backend executable (electron-builder
  # does not discover arbitrary Mach-O binaries under Resources/ on its own).
  binaries:
    - "Contents/Resources/backend/backend"

dmg:
  background: assets/installers/dmg-background.png
  window:
    width: 640
    height: 440
  contents:
    - x: 200
      y: 200
      type: file
    - x: 400
      y: 200
      type: link
      path: /Applications
