name: Refresh catalog snapshots

# The remote catalog (which engine-format quant exists per foundation model) is the
# same for every user, so resolve it ONCE here — on clean CI runners with no anonymous
# HF rate limiting — instead of at each app boot (#112). Regenerates the bundled
# per-format snapshots and commits them back to the branch the workflow ran on.
#
# Generation only calls the HF API (resolve + metadata); it does NOT build llama.cpp
# or install CUDA, so it sidesteps the runner-drift failures in the release workflow
# (#110): a plain Python install + HF requests on a pinned macOS / Ubuntu runner.

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 6 * * 1" # weekly, Monday 06:00 UTC

permissions:
  contents: write # push the refresh branch
  pull-requests: write # open/update the snapshot-refresh PR

jobs:
  generate:
    name: Generate ${{ matrix.tag }} snapshot
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            tag: mlx
            reqs: mac-silicon.txt
            force_cpu: ""
          - os: ubuntu-latest
            tag: gguf
            reqs: linux-cpu.txt
            force_cpu: "1"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements/**
      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install -r backend/requirements/entrypoints/dev/${{ matrix.reqs }}
      - name: Generate ${{ matrix.tag }} catalog snapshot
        working-directory: backend
        env:
          ERUDI_FORCE_CPU: ${{ matrix.force_cpu }}
        run: PYTHONPATH=. python -m src.database.catalog_snapshot
      - uses: actions/upload-artifact@v4
        with:
          name: catalog_snapshot_${{ matrix.tag }}
          path: backend/src/database/catalog_snapshot_${{ matrix.tag }}.json
          if-no-files-found: error

  commit:
    name: Open snapshot-refresh PR
    needs: generate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
      - uses: actions/download-artifact@v4
        with:
          path: /tmp/snapshots
      - name: Place snapshots
        run: |
          cp /tmp/snapshots/catalog_snapshot_mlx/catalog_snapshot_mlx.json backend/src/database/
          cp /tmp/snapshots/catalog_snapshot_gguf/catalog_snapshot_gguf.json backend/src/database/
      - name: Open a PR if snapshots changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/src/database/catalog_snapshot_mlx.json backend/src/database/catalog_snapshot_gguf.json
          if git diff --cached --quiet; then
            echo "Snapshots unchanged — nothing to commit."
            exit 0
          fi
          # main is a protected branch: the bot can't push to it directly, so land the
          # refresh through a PR (a human re-runs its checks and merges). Reuse one
          # branch so repeated runs update the same PR instead of piling new ones up.
          BRANCH="chore/catalog-snapshot-refresh"
          git commit -m "chore(catalog): refresh build-time snapshots from CI (#112)"
          git push -f origin "HEAD:$BRANCH"
          gh pr create --base "${{ github.ref_name }}" --head "$BRANCH" \
            --title "chore(catalog): refresh build-time snapshots" \
            --body "Automated per-engine catalog snapshot refresh, resolved from HuggingFace on clean runners. Re-run the checks before merging." \
            2>/dev/null || echo "PR already open for $BRANCH — updated via force-push."
