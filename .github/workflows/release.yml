name: Release

# Auto-release on a vX.Y.Z tag: each matrix leg builds its PyInstaller backend
# (native runner — PyInstaller can't cross-compile) then electron-builder
# packages, signs (macOS) and publishes to the SAME GitHub Release (draft).
on:
  push:
    tags:
      - "v*"

# One release at a time per tag; never cancel a half-published matrix.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write # create/upload GitHub Release assets

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14 # Apple Silicon
            variant: mac-arm
            reqs: mac-silicon-prod.txt
            spec: backend-mac-silicon.spec
            release_script: release:mac
          - os: windows-latest # x64 (CUDA build)
            variant: win-cuda
            reqs: win-cuda-121-prod.txt
            spec: backend.spec
            release_script: release:win
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash # consistent shell on every OS (git-bash on Windows)

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12" # hard pin: pgserver ships cp312 wheels only
          cache: pip
          cache-dependency-path: backend/requirements/**/*.txt

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # ── Backend: freeze with PyInstaller (native, no cross-compile) ──────────
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install -r backend/requirements/entrypoints/prod/${{ matrix.reqs }}
          pip install pyinstaller
      - name: Build backend bundle
        run: pyinstaller backend/${{ matrix.spec }} --distpath backend/dist

      # ── Frontend: webpack build → electron-builder package + sign + publish ──
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Sync version from tag
        working-directory: frontend
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          npm version "$TAG" --no-git-tag-version --allow-same-version

      - name: Build, sign and publish (electron-builder)
        working-directory: frontend
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS signing + notarization (electron-builder does it natively).
          # Empty on the Windows leg so it stays unsigned for now (SignPath later).
          CSC_LINK: ${{ matrix.variant == 'mac-arm' && secrets.CSC_LINK || '' }}
          CSC_KEY_PASSWORD: ${{ matrix.variant == 'mac-arm' && secrets.CSC_KEY_PASSWORD || '' }}
          APPLE_ID: ${{ matrix.variant == 'mac-arm' && secrets.APPLE_ID || '' }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ matrix.variant == 'mac-arm' && secrets.APPLE_ID_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ matrix.variant == 'mac-arm' && secrets.APPLE_TEAM_ID || '' }}
        run: npm run ${{ matrix.release_script }}
