name: Release

# Auto-release on a vX.Y.Z tag: each matrix leg builds its PyInstaller backend
# (native runner — PyInstaller can't cross-compile), compiles the inference binary
# it needs (Windows: llama-server from the llama.cpp submodule; macOS: none, MLX is
# pip), then electron-builder packages, signs (macOS), and publishes to the SAME
# GitHub Release (draft). Windows ships TWO auto-update channels on the one release:
# `latest` (the CPU build, universal — runs on every machine) and `cuda` (the GPU
# build). Each installed app follows the channel baked into its app-update.yml at
# build time, so a user picks cpu-vs-cuda once at download and then auto-updates
# within that channel. The binary can't be CI-run-tested (no GPU runner), so a tag
# publishes a DRAFT that is QA'd on real hardware before promotion (release.yml only
# builds + publishes the draft — see docs/dev/release-qa-checklist.md).
on:
  push:
    tags:
      - "v*"

# One release at a time per tag; never cancel a half-published matrix.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write # create/upload GitHub Release assets

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14 # Apple Silicon (MLX inference, no llama-server)
            variant: mac-arm
            reqs: mac-silicon-prod.txt
            spec: backend-mac-silicon.spec
            release_script: release:mac
            eb_extra_args: ""
          - os: windows-2022 # x64 CPU — the `latest` (universal) auto-update channel
            variant: win-cpu
            reqs: win-cpu-prod.txt
            spec: backend-cpu.spec
            release_script: release:win
            llama_build: cpu
            eb_extra_args: ""
          - os: windows-2022 # x64 CUDA — the `cuda` auto-update channel
            variant: win-cuda
            reqs: win-cuda-prod.txt
            spec: backend.spec
            release_script: release:win
            llama_build: cuda
            # Distinct channel (-> cuda.yml) + distinct artifact name so the two
            # Windows installers never clobber each other's update feed.
            eb_extra_args: "-c.publish.channel=cuda -c.nsis.artifactName='${productName}-Setup-${version}-cuda.${ext}'"
          - os: ubuntu-22.04 # x64 CPU — the `latest` (universal) Linux channel
            variant: linux-cpu
            reqs: linux-cpu-prod.txt
            spec: backend-cpu.spec
            release_script: release:linux
            llama_build: cpu
            eb_extra_args: ""
          - os: ubuntu-22.04 # x64 CUDA — the `cuda` Linux channel (cuda-linux.yml)
            variant: linux-cuda
            reqs: linux-cuda-prod.txt
            spec: backend.spec
            release_script: release:linux
            llama_build: cuda
            eb_extra_args: "-c.publish.channel=cuda -c.linux.artifactName='${productName}-${version}-cuda.${ext}'"
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash # consistent shell on every OS (git-bash on Windows)

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive # llama.cpp source for the Windows inference build

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12" # hard pin: pgserver ships cp312 wheels only
          cache: pip
          cache-dependency-path: backend/requirements/**/*.txt

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # ── CUDA toolkit (cuda legs only) ────────────────────────────────────────
      # Needed to COMPILE the CUDA llama-server. Compilation does NOT need a GPU
      # (only execution does), so this runs fine on the GPU-less runner. The pinned
      # runners keep the host toolchain in CUDA 12.6.3's supported range — notably
      # Windows = VS 2022 / MSVC 14.4x (windows-latest drifted to VS 2026 / MSVC
      # 14.51, which nvcc cannot parse → CMake CUDA compiler-id fails). The install
      # differs per OS:
      #   Windows → network install (works as-is).
      #   Linux   → toolkit-only via apt sub-packages — no driver (the `cuda` meta-
      #             package's nvidia-driver-560-open/dkms can't configure on a GPU-
      #             less runner) and, unlike the local `--toolkit` runfile, no multi-
      #             GB transient extraction that filled the small ubuntu / mid-build.
      - name: Install CUDA Toolkit (Windows — network)
        if: matrix.llama_build == 'cuda' && runner.os == 'Windows'
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: "12.6.3"
          method: network
      - name: Install CUDA Toolkit (Linux — toolkit-only, no driver)
        if: matrix.llama_build == 'cuda' && runner.os == 'Linux'
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: "12.6.3"
          method: network
          # cuda-* compiler + headers, plus the libcublas that ggml-cuda links.
          sub-packages: '["nvcc", "cudart-dev", "cccl", "nvtx", "nvrtc-dev"]'
          non-cuda-sub-packages: '["libcublas-dev"]'

      # Headroom insurance for the heavy 7-arch CUDA compile: drop preinstalled
      # bloat we never use (~20 GB) so a thin-disk runner can't run out mid-build.
      - name: Free disk space (Linux CUDA build)
        if: matrix.llama_build == 'cuda' && runner.os == 'Linux'
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc \
                      /usr/local/share/boost /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force || true
          df -h /

      # ── Backend: Python deps + PyInstaller ───────────────────────────────────
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install -r backend/requirements/entrypoints/prod/${{ matrix.reqs }}
          pip install pyinstaller

      # ── Windows/Linux: compile llama-server from the submodule. The variant-aware
      #    spec then bundles artifacts/llama-cpp/<cpu|cuda>/bin into the frozen
      #    backend. mac is MLX, so it has no llama-server step.
      - name: Build llama-server (Windows inference binary)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/dev/backend/build-llamacpp-${{ matrix.llama_build }}-win.ps1

      - name: Build llama-server (Linux inference binary)
        if: runner.os == 'Linux'
        run: bash scripts/dev/backend/build-llamacpp-${{ matrix.llama_build }}-linux.sh

      - name: Build backend bundle
        run: pyinstaller backend/${{ matrix.spec }} --distpath backend/dist

      # ── Frontend: webpack build → electron-builder package + sign + publish ──
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Sync version from tag
        working-directory: frontend
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          npm version "$TAG" --no-git-tag-version --allow-same-version

      - name: Build, sign and publish (electron-builder)
        working-directory: frontend
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS signing + notarization (electron-builder does it natively).
          # Empty on the Windows legs so they stay unsigned for now (SignPath later).
          CSC_LINK: ${{ matrix.variant == 'mac-arm' && secrets.CSC_LINK || '' }}
          CSC_KEY_PASSWORD: ${{ matrix.variant == 'mac-arm' && secrets.CSC_KEY_PASSWORD || '' }}
          APPLE_ID: ${{ matrix.variant == 'mac-arm' && secrets.APPLE_ID || '' }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ matrix.variant == 'mac-arm' && secrets.APPLE_ID_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ matrix.variant == 'mac-arm' && secrets.APPLE_TEAM_ID || '' }}
        # `-- ${{ matrix.eb_extra_args }}` forwards per-leg overrides to
        # electron-builder (empty for mac/win-cpu; channel + artifactName for win-cuda).
        run: npm run ${{ matrix.release_script }} -- ${{ matrix.eb_extra_args }}
