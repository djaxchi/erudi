name: Release

# Triggers on any tag of the form v1.2.3
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # needed to create/upload GitHub Release assets

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Windows — NSIS installer (.exe) + latest.yml
  # ─────────────────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      # ── Backend ──────────────────────────────────────────────────────────────
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip wheel setuptools
          python -m venv backend/venv
          backend/venv/Scripts/pip install -r backend/requirements/entrypoints/prod/win-cuda-121-prod.txt
          backend/venv/Scripts/pip install pyinstaller

      - name: Build backend (PyInstaller)
        run: backend/venv/Scripts/pyinstaller backend/backend.spec --distpath backend/dist

      # ── Frontend ─────────────────────────────────────────────────────────────
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Sync version from tag
        working-directory: frontend
        run: |
          TAG="${GITHUB_REF_NAME#v}"   # strip leading "v"
          npm version "$TAG" --no-git-tag-version --allow-same-version

      - name: Package (electron-forge)
        working-directory: frontend
        run: npx electron-forge package --platform win32 --arch x64

      - name: Build installer + publish to GitHub Releases (electron-builder)
        working-directory: frontend
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx electron-builder \
            --prepackaged out/erudi-win32-x64 \
            --config electron-builder.yml \
            --publish always

  # ─────────────────────────────────────────────────────────────────────────────
  # macOS — DMG + zip (zip feeds electron-updater) + latest-mac.yml
  # ─────────────────────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-14   # Apple Silicon (M1) runner
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      # ── Backend ──────────────────────────────────────────────────────────────
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip wheel setuptools
          python -m venv backend/venv
          backend/venv/bin/pip install -r backend/requirements/entrypoints/prod/mac-silicon-prod.txt
          backend/venv/bin/pip install pyinstaller

      - name: Build backend (PyInstaller)
        run: backend/venv/bin/pyinstaller backend/backend-mac-silicon.spec --distpath backend/dist

      # ── Frontend ─────────────────────────────────────────────────────────────
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Sync version from tag
        working-directory: frontend
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          npm version "$TAG" --no-git-tag-version --allow-same-version

      - name: Package (electron-forge)
        working-directory: frontend
        run: npx electron-forge package --platform darwin --arch arm64

      - name: Clean extra Electron files from DMG
        working-directory: frontend
        run: |
          rm -f out/erudi-darwin-arm64/LICENSE
          rm -f out/erudi-darwin-arm64/LICENSES.chromium.html
          rm -f out/erudi-darwin-arm64/version

      - name: Import signing certificate into keychain
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PASS=$(openssl rand -base64 20)
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV
          echo "KEYCHAIN_PASS=$KEYCHAIN_PASS" >> $GITHUB_ENV

          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"

          echo "$CSC_LINK" | base64 --decode > /tmp/cert.p12
          security import /tmp/cert.p12 -k "$KEYCHAIN_PATH" -P "$CSC_KEY_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"

          # Add to keychain search list
          security list-keychains -d user -s "$KEYCHAIN_PATH" \
            $(security list-keychains -d user | tr -d '"')

          rm /tmp/cert.p12
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Sign app bundle with codesign
        working-directory: frontend
        run: |
          APP_PATH="out/erudi-darwin-arm64/erudi.app"

          # Discover the signing identity from the keychain we just imported
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "Signing with identity: $IDENTITY"

          # Sign all nested frameworks, dylibs, and helper apps first (deep contents)
          find "$APP_PATH/Contents" -type f \( -name "*.dylib" -o -name "*.so" -o -name "*.node" \) -exec \
            codesign --force --options runtime --sign "$IDENTITY" \
              --keychain "$KEYCHAIN_PATH" \
              --entitlements assets/entitlements.mac.plist {} \;

          find "$APP_PATH/Contents/Frameworks" -depth -type d -name "*.framework" -exec \
            codesign --force --options runtime --sign "$IDENTITY" \
              --keychain "$KEYCHAIN_PATH" \
              --entitlements assets/entitlements.mac.plist {} \;

          # Find and sign any helper apps
          find "$APP_PATH/Contents" -depth -type d -name "*.app" ! -path "$APP_PATH" -exec \
            codesign --force --options runtime --sign "$IDENTITY" \
              --keychain "$KEYCHAIN_PATH" \
              --entitlements assets/entitlements.mac.plist {} \;

          # Sign the main executable
          codesign --force --options runtime --sign "$IDENTITY" \
            --keychain "$KEYCHAIN_PATH" \
            --entitlements assets/entitlements.mac.plist \
            "$APP_PATH/Contents/MacOS/erudi"

          # Sign the top-level .app bundle
          codesign --force --options runtime --sign "$IDENTITY" \
            --keychain "$KEYCHAIN_PATH" \
            --entitlements assets/entitlements.mac.plist \
            "$APP_PATH"

          # Verify the signature
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          echo "Signature verification passed"

      - name: Build installer + publish to GitHub Releases (electron-builder)
        working-directory: frontend
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          npx electron-builder \
            --prepackaged out/erudi-darwin-arm64 \
            --config electron-builder.yml \
            --publish always
